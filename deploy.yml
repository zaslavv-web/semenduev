name: Deploy to Server

# 1. Триггер: запуск при пуше в ветку main
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 2. Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. Устанавливаем нужную версию Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 4. Устанавливаем зависимости
      - name: Install dependencies
        run: npm install

      # 5. Собираем проект
      - name: Build project
        run: npm run build # Ваша команда сборки
      
      # 6. Отправляем готовые файлы на сервер через rsync
      - name: Deploy via rsync
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: ${{ secrets.TARGET_DIR }}
          SOURCE: "dist/" # Папка с результатом сборки
          ARGS: "-avz --delete" # --delete удалит на сервере файлы, которых нет в сборке
          EXCLUDE: "/node_modules/, /.git/"
